{% extends "base.html" %}
{% block content %}

<section class="page">
    <div class="page-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="shell">
        <div class="card">
            <div class="card-pad">
                <h2 class="card-title">Create Account</h2>
                <p class="card-subtitle">Make an account to start personalized guidance.</p>

                <form method="POST" class="form">
                    <input class="input" type="email" name="email" placeholder="Email" required>
                    <input class="input" type="password" name="password" placeholder="Password (min 6 chars)" required>
                    <button class="btn primary block" type="submit">Sign Up</button>
                </form>

                <div class="helper-row">
                    <a class="small-link" href="/login">Already have an account? Log in</a>
                    <a class="small-link" href="/">Back to home</a>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
